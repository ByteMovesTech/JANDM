<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>You Made It ❤️</title>

  <style>
    body {
      margin: 0;
      padding: 20px;
      background: linear-gradient(135deg, #1b1023, #3b183f, #ff6f91);
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
    }

    .container {
      max-width: 700px;
      width: 100%;
      background: rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 30px;
      backdrop-filter: blur(10px);
      box-shadow: 0 20px 50px rgba(0,0,0,0.4);
      white-space: pre-wrap;
      line-height: 1.6;
      font-size: 1.05rem;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      opacity: 0;
      animation: fadeIn 2s forwards;
    }

    #letter {
      opacity: 0;
      animation: fadeIn 2s forwards;
      animation-delay: 1s;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    .cursor {
      display: inline-block;
      width: 6px;
      background: white;
      margin-left: 3px;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>You made it… ❤️</h1>
    <div id="letter"></div>
  </div>

  <script>
    const text = `Jaclyn,

Two years. Somehow it feels like both a blink and a lifetime all at once.

There are so many memories… so many things that somehow became our things. I still remember that first conversation. It was so fun, and you were so sweet. We were teasing each other, and you felt bad for hating on the Chiefs… hehehe. So adorable. And I remember I was having a rough day, and without hesitation you said, "You wanna talk about it?" That’s who you are. Sweet. Caring. Real. I was completely smitten from the very beginning.

I think about the podcast days too. That was something else… fun, exciting, and yeah—sexy as hell. I loved when you shared those clips with me. And I have to be honest… some of those excerpts? Damn. The way you read them—it’s not just the words. When I hear your voice, it’s like it becomes us in those moments, and I get completely lost in it. I loved that. And when you recorded yourself reading the story I wrote for us… my God. Do you have any idea what that does to me? Your voice, that personal touch… it’s so incredibly sexy. You drive me crazy in the best way. And I wouldn’t object to more of that… just saying. Hehehe.

And then there’s your cookies. I don’t think I could ever fully express how amazing you are when you bake and decorate. The creativity, the care, the way you bring your ideas to life—it’s incredible. I love when you share that part of yourself with me. And selfishly, I love being part of it, even in a small way. Brainstorming ideas, tossing around designs… it makes me feel closer to you, like we’re building something together. I absolutely love that.

And we really know how to have fun, don’t we? From Farkle to Codenames, drawing games, Clues by Sam, coloring, and cryptic crosswords… we can turn anything into a good time. Even when I joke about not being able to talk to you during games, the truth is—I just love being there with you. Laughing, competing, teasing each other… it means everything to me.

I was so happy you got to go to Mexico with your sister. You deserved that. But I won’t lie… I would have given anything to be there with you. Walking beside you on the beach, taking in those views, stealing little moments together. Feeling you close, with the sound of the ocean around us… Someday, I really hope we make that trip happen. I want that with you so badly.

There’s also something deeper that we share… something not everyone understands. That quiet, unspoken connection of loss. Being part of that “club” isn’t something I’d ever wish on anyone. Losing one parent is hard… losing both, especially so early, changes you. But somehow, in that, we found each other. And I cherish that connection. I love hearing you talk about your mom and your dad. I hang on every word, wishing I could have known them… because they helped shape the incredible woman I love so deeply.

And that’s what it always comes back to… you.

I love you so much, Jaclyn.

I love that we can talk about anything. The easy stuff, the hard stuff, the funny, the painful, the random… all of it. You’ve shared pieces of your life with me that have made me laugh out loud, smile for hours, and even brought tears to my eyes. Every one of those moments pulls me closer to you. I don’t just love you… I truly cherish you.

I love you in a way that’s hard to fully put into words. It’s a love that’s both tender and passionate… one that wants to hold you close and never let go, and at the same time gets completely lost in you. It’s deep, intense, and real. That’s how I feel about you.

The other night when you said it feels like three years instead of two… that stayed with me. Because I feel it too. In the best possible way. Like somehow you’ve been part of my life longer than time can measure. Like you belong here—with me—in a way that just makes sense.

I could say I’m glad I found you… but the truth is, you found me. And I will never stop being grateful for that. Not for a second.

I’m so in love with you, Jaclyn. Completely. Deeply. In every way that matters.

And I’m not going to let you go. Ever.

I love you so very much,  
Mike ❤️`;

    const letterEl = document.getElementById("letter");

    let i = 0;

    function typeWriter() {
      if (i < text.length) {
        letterEl.innerHTML = text.substring(0, i) + '<span class="cursor"></span>';
        i++;
        setTimeout(typeWriter, 18);
      } else {
        letterEl.innerHTML = text;
      }
    }

    setTimeout(typeWriter, 1200);
  </script>

</body>
</html>
