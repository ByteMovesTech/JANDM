<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>You Made It ❤️</title>

  <style>
    body {
      margin: 0;
      padding: 20px;
      background: linear-gradient(135deg, #1b1023, #3b183f, #ff6f91);
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
    }

    .container {
      max-width: 700px;
      width: 100%;
      background: rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 30px;
      backdrop-filter: blur(10px);
      box-shadow: 0 20px 50px rgba(0,0,0,0.4);
      line-height: 1.6;
      font-size: 1.05rem;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      opacity: 0;
      animation: fadeIn 2s forwards;
    }

    #letter {
      white-space: pre-wrap;
      opacity: 0;
      animation: fadeIn 2s forwards;
      animation-delay: 1s;
    }

    #reveal {
      text-align: center;
      margin-top: 30px;
      opacity: 0;
      transition: opacity 2s ease;
    }

    #reveal img {
      width: 100%;
      max-width: 350px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    #caption {
      margin-top: 12px;
      font-size: 1.1rem;
      opacity: 0.9;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    .cursor {
      display: inline-block;
      width: 6px;
      background: white;
      margin-left: 3px;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }
  </style>
</head>

<body>

  <div class="container">

    <h1>You made it… ❤️</h1>

    <div id="letter"></div>

    <div id="reveal">
      <img src="your-photo.jpg" alt="Mike">
      <div id="caption">I love you ❤️</div>
    </div>

  </div>

  <script>
    const text = `Jaclyn,

Two years. Somehow it feels like both a blink and a lifetime all at once.

... (your full letter stays exactly the same — paste it here from your version) ...

I love you so very much,  
Mike ❤️`;

    const letterEl = document.getElementById("letter");
    const revealEl = document.getElementById("reveal");

    let i = 0;

    function typeWriter() {
      if (i < text.length) {
        letterEl.innerHTML = text.substring(0, i) + '<span class="cursor"></span>';
        i++;
        setTimeout(typeWriter, 18);
      } else {
        letterEl.innerHTML = text;

        // pause before reveal
        setTimeout(() => {
          revealEl.style.opacity = "1";
        }, 2500);
      }
    }

    setTimeout(typeWriter, 1200);
  </script>

</body>
</html>
