<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>You Made It ❤️</title>

  <style>
    body {
      margin: 0;
      padding: 20px;
      background: linear-gradient(135deg, #1b1023, #3b183f, #ff6f91);
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
    }

    .container {
      max-width: 700px;
      width: 100%;
      background: rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 30px;
      backdrop-filter: blur(10px);
      box-shadow: 0 20px 50px rgba(0,0,0,0.4);
      line-height: 1.6;
      font-size: 1.05rem;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      opacity: 0;
      animation: fadeIn 2s forwards;
    }

    #letter {
      white-space: pre-wrap;
      opacity: 0;
      animation: fadeIn 2s forwards;
      animation-delay: 1s;
    }

    #reveal {
      text-align: center;
      margin-top: 30px;
      opacity: 0;
      transition: opacity 2s ease;
    }

    #reveal img {
      width: 100%;
      max-width: 350px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    #caption {
      margin-top: 12px;
      font-size: 1.1rem;
      opacity: 0.9;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    .cursor {
      display: inline-block;
      width: 6px;
      background: white;
      margin-left: 3px;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }
  </style>
</head>

<body>

  <div class="container">

    <h1>You made it… ❤️</h1>

    <div id="letter"></div>

    <div id="reveal">
      <img src="your-photo.jpg" alt="Mike">
      <div id="caption">I love you ❤️</div>
    </div>

  </div>

  <script>
    const text = `Jaclyn,

Two years. Somehow it feels like both a blink and a lifetime all at once.

There are so many memories and things to mention. So many things that somehow became our things. I still remember that first conversation. It was so fun and you were so sweet. I don't know how to explain it. We were both teasing each other and you felt bad for hating on the Chiefs. hehehe so sweet. I also remember I think I had a rough day and you immediately said, "You wanna talk about it?" So sweet and caring. I was completely smitten from the very beginning.

I also remember the times you were doing the podcast. That was pretty fun and sexy. I really enjoyed it when you shared the clips with me… I have to be honest, some of those excerpts? Damn. The way you read them… it’s not just the words. When I hear you, it’s you and me in those moments, and I would get completely lost in it. I loved that.. Or when you recorded yourself reading the short story I wrote for us. My God. Do you know what that does to me? The personal touch, your voice.. It's so sexy and hot. Drives me absolutely crazy.  I would not object to us doing more of that. just saying! Hehehe. You are so sexy, you turn me on a lot.

And then there’s your cookies. I don’t think I could ever say enough about how amazing you are when you bake and decorate. The creativity, the care, the way you bring your ideas to life. I love when you share that part of yourself with me. And selfishly? I love being part of it, even in a small way. Brainstorming designs, tossing around ideas… it makes me feel even closer to you, like we’re building something together. I absolutely love it.

And we really know how to have fun, don’t we? From Farkle to Codenames, the drawing game, Clues by Sam, colouring, and Crypto crosswords… we can turn anything into a good time. Even when I joke about not being able to talk to you during some of the games, the truth is, I just love being there with you. Laughing, competing, teasing each other… it’s amazing, and I love it.

I was so happy you got to go to Mexico with your sister. You deserved that. But I won’t lie, I would have given anything to be there with you. Walking beside you on the beach, sharing those views, stealing little moments together. Making love to you with the sound of the ocean in the background. Someday… I really hope we make that trip happen. I want that so badly with you.

There’s also something deeper that we share… something not everyone understands. That quiet, unspoken connection of loss. Being part of that “club” isn’t something I’d ever wish on anyone. Losing one parent is hard… losing both, especially so early, changes you. But somehow, in that, we found each other. And I cherish that connection. I love when you tell me stories about your mom and your dad. I listen to every word, wishing I could have known them, because they helped shape the incredible woman I love so dearly.

And that’s really what it comes down to, isn’t it? You. I love you so much, Jaclyn!

I love that we can talk about anything. The easy stuff, the hard stuff, the funny, the painful, the random… all of it. You’ve shared pieces of your life with me that made me laugh out loud, made me smile for hours, and even brought tears to my eyes. Every single one of those moments just pulls me closer to you. I don’t just love you, I cherish you.

I love you in a way that’s hard to put into words. It’s a love that’s both tender and passionate, a love that wants to make love to you gently and fiercely at the same time. It’s a love that wants to cherish every moment with you, whether we’re laughing together or lost in each other’s embrace. I want to make love to you and fuck you like crazy, all at once, because that’s how deeply I feel for you.

The other night when you said it felt like three years instead of two… That stuck with me. Because I feel it too. In the best way possible. Like somehow you’ve been part of my life longer than time can measure. Like you belong here, with me, in a way that just makes sense.

I could say I’m glad I found you… but the truth is, you found me. And I will never stop being grateful for that. Not for a second.

I’m so in love with you, Jaclyn. Completely.. Deeply... In every way that matters.

And I’m not going to let you go. Ever.

I love you so very much, Mike ❤️`;

    const letterEl = document.getElementById("letter");
    const revealEl = document.getElementById("reveal");

    let i = 0;

    function typeWriter() {
      if (i < text.length) {
        letterEl.innerHTML = text.substring(0, i) + '<span class="cursor"></span>';
        i++;
       setTimeout(typeWriter, 100);
      
      } else {
        letterEl.innerHTML = text;

        // pause before reveal
        setTimeout(() => {
          revealEl.style.opacity = "1";
        }, 2500);
      }
    }

    setTimeout(typeWriter, 1200);
  </script>

</body>
</html>
