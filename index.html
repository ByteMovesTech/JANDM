<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Something Special Awaits ❤️</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    * {
      box-sizing: border-box;
    }body {
  margin: 0;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #1b1023, #3b183f, #ff6f91);
  color: white;
  font-family: Arial, sans-serif;
  text-align: center;
  padding: 20px;
}

.card {
  width: 100%;
  max-width: 700px;
  padding: 40px 28px;
  background: rgba(255, 255, 255, 0.08);
  border-radius: 28px;
  backdrop-filter: blur(10px);
  box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
}

h1 {
  font-size: clamp(2rem, 5vw, 3.4rem);
  margin: 0 0 18px;
  line-height: 1.2;
}

p {
  margin: 0 0 28px;
  font-size: 1.1rem;
  line-height: 1.6;
  color: #ffe9f1;
}

.countdown {
  display: grid;
  grid-template-columns: repeat(4, minmax(70px, 1fr));
  gap: 14px;
  margin-top: 20px;
}

.time-box {
  padding: 18px 10px;
  border-radius: 20px;
  background: rgba(255, 255, 255, 0.14);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.12);
}

.number {
  display: block;
  font-size: clamp(1.8rem, 5vw, 3rem);
  font-weight: bold;
  text-shadow: 0 0 18px rgba(255,255,255,0.35);
}

.label {
  display: block;
  margin-top: 8px;
  font-size: 0.9rem;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: #ffe9f1;
}

@media (max-width: 640px) {
  .countdown {
    grid-template-columns: repeat(2, minmax(100px, 1fr));
  }
}

  </style>
</head>
<body>
  <div class="card">
    <h1>Something special is waiting for you… ❤️</h1>
    <p>
      A little surprise is on its way. Until then, the countdown is on.
    </p><div class="countdown">
  <div class="time-box">
    <span class="number" id="days">0</span>
    <span class="label">Days</span>
  </div>
  <div class="time-box">
    <span class="number" id="hours">0</span>
    <span class="label">Hours</span>
  </div>
  <div class="time-box">
    <span class="number" id="minutes">0</span>
    <span class="label">Minutes</span>
  </div>
  <div class="time-box">
    <span class="number" id="seconds">0</span>
    <span class="label">Seconds</span>
  </div>
</div>

  </div>  <script>
    const targetDate = new Date('April 17, 2026 00:00:00').getTime();

    function updateCountdown() {
      const now = new Date().getTime();
      const distance = targetDate - now;

      if (distance <= 0) {
        window.location.href = 'login.html';
        return;
      }

      const days = Math.floor(distance / (1000 * 60 * 60 * 24));
      const hours = Math.floor((distance / (1000 * 60 * 60)) % 24);
      const minutes = Math.floor((distance / (1000 * 60)) % 60);
      const seconds = Math.floor((distance / 1000) % 60);

      document.getElementById('days').innerText = days;
      document.getElementById('hours').innerText = hours;
      document.getElementById('minutes').innerText = minutes;
      document.getElementById('seconds').innerText = seconds;
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);
  </script></body>
</html>
