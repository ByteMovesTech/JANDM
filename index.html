<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Something Special Awaits ❤️</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1b1023, #3b183f, #ff6f91);
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 700px;
      padding: 40px 28px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 28px;
      backdrop-filter: blur(10px);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
    }

    h1 {
      font-size: clamp(2rem, 5vw, 3.4rem);
      margin: 0 0 18px;
    }

    p {
      margin: 0 0 28px;
      font-size: 1.1rem;
      color: #ffe9f1;
    }

    .countdown {
      display: grid;
      grid-template-columns: repeat(4, minmax(70px, 1fr));
      gap: 14px;
    }

    .time-box {
      padding: 18px 10px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.14);
    }

    .number {
      font-size: 2.5rem;
      font-weight: bold;
    }

    .label {
      margin-top: 6px;
      font-size: 0.8rem;
      text-transform: uppercase;
      color: #ffe9f1;
    }

    @media (max-width: 640px) {
      .countdown {
        grid-template-columns: repeat(2, minmax(100px, 1fr));
      }
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>Something special is waiting for you… ❤️</h1>
    <p>A little surprise is on its way. Until then, the countdown is on.</p>

    <div class="countdown">
      <div class="time-box">
        <div class="number" id="days">0</div>
        <div class="label">Days</div>
      </div>
      <div class="time-box">
        <div class="number" id="hours">0</div>
        <div class="label">Hours</div>
      </div>
      <div class="time-box">
        <div class="number" id="minutes">0</div>
        <div class="label">Minutes</div>
      </div>
      <div class="time-box">
        <div class="number" id="seconds">0</div>
        <div class="label">Seconds</div>
      </div>
    </div>
  </div>

  <!-- 🎵 Background Music -->
  <audio id="bgMusic" loop>
    <source src="jeopardy.mp3" type="audio/mpeg">
  </audio>

  <script>
    const audio = document.getElementById("bgMusic");

    // Set volume (0.0 - 1.0)
    audio.volume = 0.3;

    // Start music on first tap (mobile-friendly)
    document.addEventListener("click", () => {
      if (audio.paused) {
        audio.play();
      }
    });

    const targetDate = new Date('April 17, 2026 00:00:00').getTime();

    function updateCountdown() {
      const now = new Date().getTime();
      const distance = targetDate - now;

      // Stop music + redirect when time hits
      if (distance <= 0) {
        audio.pause();
        audio.currentTime = 0;

        window.location.href = 'login.html';
        return;
      }

      const days = Math.floor(distance / (1000 * 60 * 60 * 24));
      const hours = Math.floor((distance / (1000 * 60 * 60)) % 24);
      const minutes = Math.floor((distance / (1000 * 60)) % 60);
      const seconds = Math.floor((distance / 1000) % 60);

      document.getElementById('days').innerText = days;
      document.getElementById('hours').innerText = hours;
      document.getElementById('minutes').innerText = minutes;
      document.getElementById('seconds').innerText = seconds;
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);
  </script>

</body>
</html>
