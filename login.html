<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memory Gate ❤️</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="center">
    <div class="card fade-in">

      <h2>Welcome, beautiful ❤️</h2>

      <p>
        There’s something waiting for you.<br>
        You already know the answer… just follow your heart.
      </p>

      <input type="password" id="pass" placeholder="Enter password">

      <button onclick="checkPass()">Unlock</button>

      <p id="msg"></p>

    </div>
  </div>

  <script>
    function checkPass() {
      const pass = document.getElementById("pass").value.toLowerCase().trim();

      if (pass === "0417") {
        window.location.href = "intro.html";
      } else {
        document.getElementById("msg").innerText =
          "Not quite… think of a date that means us ❤️";
      }
    }
  </script>
</body>
</html>
