<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enter Your Surprise ❤️</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #111, #2a1020);
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
    }.card {
  max-width: 500px;
  width: 90%;
  padding: 40px;
  background: rgba(255,255,255,0.08);
  border-radius: 24px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.35);
  backdrop-filter: blur(8px);
}

h2 {
  margin-bottom: 10px;
  font-size: 2rem;
}

p {
  line-height: 1.6;
  color: #f5dce6;
}

input {
  width: 80%;
  padding: 14px;
  margin-top: 20px;
  border: none;
  border-radius: 999px;
  font-size: 1rem;
  text-align: center;
}

button {
  margin-top: 18px;
  padding: 14px 28px;
  border: none;
  border-radius: 999px;
  font-size: 1rem;
  cursor: pointer;
  background: #ff4f87;
  color: white;
}

#msg {
  margin-top: 18px;
  min-height: 24px;
  color: #ffd6e4;
}

  </style>
</head>
<body>
  <div class="card">
    <h2>Welcome, beautiful ❤️</h2>
    <p>
      There’s something waiting for you.
      You already know the answer… just follow your heart.
    </p><input type="password" id="pass" placeholder="Enter your password">
<br>
<button onclick="checkPass()">Unlock</button>
<p id="msg"></p>

  </div>  <script>
    function checkPass() {
      const pass = document.getElementById('pass').value.toLowerCase().trim();

      if (pass === '0417') {
        window.location.href = 'intro.html';
      } else {
        document.getElementById('msg').innerText =
          'Hmm… not quite. Think of something that means us ❤️';
      }
    }
  </script></body>
</html>
